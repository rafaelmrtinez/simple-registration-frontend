name: React Registration Frontend CI

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  builder:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout repository
        uses: actions/checkout@v4
      - 
        name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - 
        name: Install dependencies
        run: npm ci
      - 
        name: Run Lint
        run: npm run lint
      - 
        name: Build
        run: npm run build

  dockerize-job:
    runs-on: ubuntu-latest
    needs: builder

    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      - 
        name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - 
        name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/registry-frontend:${{ env.SHORT_SHA }}
            ${{ vars.DOCKERHUB_USERNAME }}/registry-frontend:latest
            ghcr.io/${{ github.repository_owner }}/registry-frontend:${{ env.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/registry-frontend:latest
