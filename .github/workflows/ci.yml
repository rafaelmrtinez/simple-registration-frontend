name: React Registration Frontend CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Run Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run preview
        run: npm run preview
    
